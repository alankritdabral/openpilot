name: "openpilot env setup"

env:
  UV_SYSTEM_PYTHON: 1

runs:
  using: "composite"
  steps:
    - shell: bash
      run: git lfs pull

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools

    - shell: bash
      run: |
        which python
        python -m venv venv
        source venv/bin/activate
        pip show setuptools
        pip3 install -r .github/workflows/setup/requirements.txt
