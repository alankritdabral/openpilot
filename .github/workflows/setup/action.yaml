name: "openpilot env setup"

inputs:
  is_retried:
    description: "A mock param that asserts that we use the setup-with-retry instead of this action directly"
    required: false
    default: "false"

env:
  UV_SYSTEM_PYTHON: 1

runs:
  using: "composite"
  steps:
    - shell: bash
      if: ${{ inputs.is_retried == 'false' }}
      run: |
        echo "You should not run this action directly. Use setup-with-retry instead"

    - shell: bash
      run: git lfs pull

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
          
    - shell: bash
      run: |
        python -m pip show pip
        pip install setuptools = "69.1"
        python -m pip show wheel

    - shell: bash
      run: |
        which python
        pip install aiohttp aiortc attrs av azure-core azure-identity azure-storage-blob casadi certifi cffi charset-normalizer click cloudpickle codespell colorama coloredlogs contourpy coverage crcmod cryptography cycler cython dictdiffer dnspython ewmhlib execnet farama-notifications filelock flaky flatbuffers fonttools frozenlist future-fstrings geopandas ghp-import google-crc32c gymnasium humanfriendly hypothesis idna ifaddr importlib-metadata iniconfig inputs isodate jinja2 json-rpc kiwisolver libusb1 lru-dict lxml markdown markupsafe matplotlib mergedeep mkdocs mkdocs-get-deps mouseinfo mpmath msal msal-extensions multidict mypy mypy-extensions natsort numpy onnx onnxruntime-gpu opencv-python-headless packaging panda3d panda3d-gltf panda3d-simplepbr pandas parameterized pathspec pillow platformdirs pluggy portalocker pre-commit-hooks progressbar protobuf psutil pyarrow pyaudio pyautogui pycapnp pycparser pycryptodome pyee pygame pygetwindow pygments pyjwt pylibsrtp pymonctl pymsgbox pyogrio pyopencl pyopenssl pyparsing pyperclip pyprof2calltree pyproj pyqt5 pyqt5-sip pyrect pyscreeze pyserial pytest pytest-asyncio pytest-cov pytest-mock pytest-randomly pytest-repeat pytest-subtests pytest-timeout pytest-xdist python-dateutil python-xlib python3-xlib pytools pytweening pytz pywinbox pywinctl pyyaml pyyaml-env-tag pyzmq requests rerun-sdk ruamel-yaml ruamel-yaml-clib ruff scipy scons seaborn sentry-sdk setproctitle setuptools shapely siphash24 six smbus2 sortedcontainers sounddevice spidev sympy tabulate tomli tqdm types-requests types-tabulate typing-extensions tzdata urllib3 watchdog websocket-client yapf yarl zipp zstandard
