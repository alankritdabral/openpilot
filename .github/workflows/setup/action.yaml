name: "openpilot env setup"

env:
  UV_SYSTEM_PYTHON: 1

runs:
  using: "composite"
  steps:
    - shell: bash
      run: git lfs pull

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - shell: bash
      run: |
        which python
        python3 -m venv venv
        source venv/bin/activate
        pip3 install -r .github/workflows/setup/requirements.txt
