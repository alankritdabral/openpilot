name: "openpilot env setup"

inputs:
  is_retried:
    description: "A mock param that asserts that we use the setup-with-retry instead of this action directly"
    required: false
    default: "false"

env:
  UV_SYSTEM_PYTHON: 1

runs:
  using: "composite"
  steps:
    - shell: bash
      if: ${{ inputs.is_retried == 'false' }}
      run: |
        echo "You should not run this action directly. Use setup-with-retry instead"

    - shell: bash
      run: git lfs pull

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'

    - shell: bash
      run: |
        ./tools/install_ubuntu_dependencies.sh
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          clang \
          cppcheck \
          build-essential \
          gcc-arm-none-eabi \
          liblzma-dev \
          capnproto \
          libcapnp-dev \
          curl \
          libcurl4-openssl-dev \
          git \
          git-lfs \
          ffmpeg \
          libavformat-dev \
          libavcodec-dev \
          libavdevice-dev \
          libavutil-dev \
          libavfilter-dev \
          libbz2-dev \
          libeigen3-dev \
          libffi-dev \
          libglew-dev \
          libgles2-mesa-dev \
          libglfw3-dev \
          libglib2.0-0 \
          libqt5charts5-dev \
          libncurses5-dev \
          libssl-dev \
          libusb-1.0-0-dev \
          libzmq3-dev \
          libzstd-dev \
          libsqlite3-dev \
          libsystemd-dev \
          locales \
          opencl-headers \
          ocl-icd-libopencl1 \
          ocl-icd-opencl-dev \
          portaudio19-dev \
          qttools5-dev-tools \
          libqt5svg5-dev \
          libqt5serialbus5-dev \
          libqt5x11extras5-dev \
          libqt5opengl5-dev \
          g++-12 \
          qtbase5-dev \
          qtchooser \
          qt5-qmake \
          qtbase5-dev-tools 

        if [[ -d "/etc/udev/rules.d/" ]]; then
          # Setup panda udev rules
          echo "Setting up panda udev rules"
          echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="bbaa", ATTRS{idProduct}=="ddcf", MODE="0666"' | sudo tee /etc/udev/rules.d/12-panda_jungle.rules
          echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="bbaa", ATTRS{idProduct}=="ddef", MODE="0666"' | sudo tee -a /etc/udev/rules.d/12-panda_jungle.rules

          # Setup jungle udev rules
          echo "Setting up jungle udev rules"
          echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="bbaa", ATTRS{idProduct}=="ddcc", MODE="0666"' | sudo tee /etc/udev/rules.d/11-panda.rules
          echo 'SUBSYSTEM=="usb", ATTRS{idVendor}=="bbaa", ATTRS{idProduct}=="ddee", MODE="0666"' | sudo tee -a /etc/udev/rules.d/11-panda.rules

          sudo udevadm control --reload-rules && sudo udevadm trigger || true
        else
          echo "No /etc/os-release in the system. Make sure you're running on Ubuntu, or similar."
          exit 1
        fi

    - uses: astral-sh/setup-uv@v3

    - shell: bash
      run: uv python install

    - shell: bash
      run: |
        sudo su
        uv venv
        uv sync --all-extras --dev
        exit
